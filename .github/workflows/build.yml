name: build-installers

# Build double-click installers for Windows (.exe) and macOS (.dmg).
# Trigger by pushing a version tag (git tag v1.0.1 && git push --tags)
# or manually from the Actions tab (Run workflow).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# needed so the workflow can publish a Release with the installers attached
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: audioedit-windows
            bundle_glob: src-tauri/target/release/bundle/nsis/*-setup.exe
          - os: macos-latest
            artifact: audioedit-macos
            bundle_glob: src-tauri/target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # CPU-only torch keeps the bundle small (the CUDA build is ~2.5GB extra)
      - name: Install backend deps (CPU torch)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Freeze backend (PyInstaller)
        working-directory: backend
        run: pyinstaller --noconfirm audioedit-backend.spec

      - name: Install frontend deps
        run: npm ci

      - name: Build app (bundles the sidecar)
        run: npm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bundle_glob }}
          if-no-files-found: error

      # On a version tag, publish a Release with the installer attached so
      # non-technical users can download from one simple page (no Actions/zip).
      - name: Attach installer to the Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.bundle_glob }}
          fail_on_unmatched_files: true
          body: |
            ## ดาวน์โหลดตัวติดตั้ง

            - **Windows**: ไฟล์ `.exe`
            - **Mac**: ไฟล์ `.dmg`

            วิธีติดตั้งแบบละเอียด (ภาษาชาวบ้าน): ดู [ติดตั้ง.md](https://github.com/songthegemini-prog/audioedit/blob/main/%E0%B8%95%E0%B8%B4%E0%B8%94%E0%B8%95%E0%B8%B1%E0%B9%89%E0%B8%87.md)
